    <!DOCTYPE html> 
<html lang="en"> 
  <head> 
    <meta charset="UTF-8" /> 
    <meta http-equiv="X-UA-Compatible" content="IE=edge" /> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0" /> 
    <title>Timer</title>  
    <script type="module" crossorigin src="/countdown-timer/1-timer.js"></script>
    <link rel="modulepreload" crossorigin href="/countdown-timer/assets/modulepreload-polyfill-B5Qt9EMX.js">
    <link rel="modulepreload" crossorigin href="/countdown-timer/assets/vendor-BbbuE1sJ.js">

  <body> 
  <main class="timer-page">
    <a href="./index.html" class="back">Go back</a>

      <label class="timer-label" for="datetime-picker">
        Choose date and time
      </label>
      <input type="text" id="datetime-picker" title="Choose date and time">
      <button type="button" data-start>Start</button>

      <div class="timer">
        <div class="field">
          <span class="value" data-days>00</span>
          <span class="label">Days</span>
        </div>

        <div class="field">
          <span class="value" data-hours>00</span>
          <span class="label">Hours</span>
        </div>

        <div class="field">
          <span class="value" data-minutes>00</span>
          <span class="label">Minutes</span>
        </div>

      <div class="field">
        <span class="value" data-seconds>00</span>
        <span class="label">Seconds</span>
      </div>
    </div>
  </main>


  </body> 
</html>
